<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - RJA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="rja.png" alt="Logo RJA" class="logo">
        </div>

        <!-- Formulario de Login -->
        <div id="login-form" class="form-box">
            <h2>Iniciar Sesión</h2>
            <form>
                <div class="input-group">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="********" required>
                </div>
                <button type="submit" class="btn-main">Entrar</button>
            </form>
            <p class="switch-text">¿No tienes cuenta? <a href="#" onclick="toggleForm()">Regístrate aquí</a></p>
        </div>

        <!-- Formulario de Registro (Oculto por defecto) -->
        <div id="register-form" class="form-box hidden">
            <h2>Crear Cuenta</h2>
            <form>
                <div class="input-group">
                    <label for="reg-name">Nombre Completo</label>
                    <input type="text" id="reg-name" placeholder="Tu nombre" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
                </div>
                <button type="submit" class="btn-main">Registrarse</button>
            </form>
            <p class="switch-text">¿Ya tienes cuenta? <a href="#" onclick="toggleForm()">Inicia sesión</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
